<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Media Studio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 30px 15px;
            margin: 0;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h2 { margin-top: 0; color: #ffffff; font-size: 24px; }
        p { color: #a0a0a0; font-size: 14px; }
        .video-wrapper {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            aspect-ratio: 4/3;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .status-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            visibility: hidden;
        }
        .recording .status-overlay { visibility: visible; }
        .red-dot {
            width: 10px; height: 10px; background-color: #dc3545;
            border-radius: 50%; margin-right: 8px; animation: blink 1s infinite;
        }
        .btn-group {
            margin-top: 20px; display: flex; justify-content: space-between; gap: 15px;
        }
        .btn {
            flex: 1; padding: 14px; font-size: 16px; font-weight: bold;
            color: white; border: none; border-radius: 8px; cursor: pointer;
        }
        #startBtn { background-color: #2eb85c; }
        #stopBtn { background-color: #e55353; }
        .btn:disabled { background-color: #3a3a3a !important; color: #777 !important; cursor: not-allowed; }
        
        /* Progress Indicator Styling */
        #uploadingStatus {
            margin-top: 15px;
            font-weight: bold;
            color: #321fdb;
            display: none;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h2>Media Capture Studio</h2>
        <p>Grant permission to activate the high-definition recording system.</p>

        <div class="video-wrapper">
            <div class="status-overlay">
                <div class="red-dot"></div>
                <span id="timerLabel">00:00</span>
            </div>
            <video id="video" autoplay playsinline muted></video>
        </div>

        <div class="btn-group">
            <button id="startBtn" class="btn">Start Recording</button>
            <button id="stopBtn" class="btn" disabled>Stop & Send</button>
        </div>

        <div id="uploadingStatus">📤 Initializing upload process...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const mainContainer = document.getElementById('mainContainer');
        const timerLabel = document.getElementById('timerLabel');
        const uploadingStatus = document.getElementById('uploadingStatus');

        let mediaRecorder;
        let recordedChunks = [];
        let localStream;
        let timerInterval;
        let secondsElapsed = 0;

        async function initMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "user" }, 
                    audio: true 
                });
                video.srcObject = localStream;
            } catch (err) {
                console.error("Setup error:", err);
            }
        }

        function startTimer() {
            secondsElapsed = 0;
            timerLabel.innerText = "00:00";
            timerInterval = setInterval(() => {
                secondsElapsed++;
                let secs = secondsElapsed % 60;
                let mins = Math.floor(secondsElapsed / 60);
                timerLabel.innerText = (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
                
                if (secondsElapsed >= 30) { stopRecording(); }
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }

        startBtn.addEventListener('click', () => {
            if (!localStream) return alert("System media streams are inactive.");
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(localStream, { mimeType: 'video/webm;codecs=vp8,opus' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = handleUpload;
            
            mediaRecorder.start();
            mainContainer.classList.add('recording');
            startTimer();
            startBtn.disabled = true;
            stopBtn.disabled = false;
        });

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                stopTimer();
                mainContainer.classList.remove('recording');
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        stopBtn.addEventListener('click', stopRecording);

        // Advanced Analytics and Percentage upload function
        async function handleUpload() {
            uploadingStatus.style.display = "block";
            uploadingStatus.innerText = "📊 Gathering device analysis details...";

            // 1. Gather Device Information
            let deviceInfo = `Device OS: ${navigator.platform}\nBrowser Agent: ${navigator.userAgent}`;
            
            // 2. Gather Battery Information
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    deviceInfo += `\nBattery Level: ${Math.round(battery.level * 100)}%\nIs Charging: ${battery.charging ? "Yes" : "No"}`;
                }
            } catch (e) { console.log("Battery tracking skipped."); }

            const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
            const formData = new FormData();
            formData.append('video_file', videoBlob, 'recording.webm');
            formData.append('device_meta', deviceInfo); // Attach metadata payload

            // 3. Monitor Upload Progress Percentages using XMLHttpRequest
            const xhr = new XMLHttpRequest();
            xhr.open("POST", "/upload-video", true);

            xhr.upload.addEventListener("progress", (e) => {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    uploadingStatus.innerText = `📤 Uploading packet: ${percentComplete}% complete...`;
                }
            });

            xhr.onload = function () {
                uploadingStatus.style.display = "none";
                if (xhr.status === 200) {
                    alert("✨ Video along with structural device telemetry sent to ShaswatCam successfully!");
                } else {
                    alert("Upload error handling transaction on host server.");
                }
            };

            xhr.send(formData);
        }

        window.addEventListener('load', initMedia);
    </script>
</body>
</html>
